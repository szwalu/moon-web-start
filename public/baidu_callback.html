<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授权成功</title>
</head>
<body style="text-align: center; padding-top: 60px; font-family: -apple-system, sans-serif; background: #f9fafb;">
    
    <div id="content">
        <h2 style="color: #10b981; font-size: 22px; margin-bottom: 10px;">授权成功！</h2>
        <p style="color: #666; font-size: 14px;">已安全获取百度网盘权限</p>
        
        <a id="btn" href="#" style="display: none; margin-top: 30px; padding: 14px 40px; background-color: #6366f1; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 12px rgba(99,102,241,0.3);">
            立即返回鸡毛蒜皮
        </a>
    </div>

    <script>
        // 1. 从当前网址提取百度发来的 code
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        
        if (code) {
            // 2. 🚀 魔法跳板：拼接自定义协议，强行呼叫你的 App！
            const appUrl = "trifles://auth?code=" + code + "&platform=baidu";
            
            // 尝试自动跳转
            window.location.href = appUrl;
            
            // 3. 兜底设计：如果安卓浏览器拦截了自动跳转，给用户一个手动点击的按钮
            setTimeout(() => {
                document.body.innerHTML = `
                    <h3>即将完成！</h3>
                    <p style="color: #666;">如果页面没有自动关闭，请点击下方按钮：</p>
                    <a href="${appUrl}" style="display: inline-block; padding: 12px 24px; background: #2563eb; color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 20px;">
                        👉 点击这里返回应用
                    </a>
                `;
            }, 1500);
        } else {
            document.body.innerHTML = "<h3 style='color:red;'>授权失败：未获取到验证码</h3>";
        }
    </script>
</body>
</html>
