<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百度授权成功</title>
    <style>
        body { text-align: center; padding-top: 80px; font-family: -apple-system, sans-serif; background: #f9fafb; margin: 0; }
        .btn { display: inline-block; margin-top: 30px; padding: 16px 50px; background-color: #2563eb; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 18px; box-shadow: 0 4px 16px rgba(37,99,235,0.3); transition: transform 0.2s; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="content">
        <h2 style="color: #10b981; font-size: 26px; margin-bottom: 10px;">✅ 授权成功！</h2>
        <p style="color: #666; font-size: 15px; padding: 0 20px;">安全连接已建立，请点击下方按钮返回应用</p>
        
        <a id="btn" class="btn" href="#">返回 鸡毛蒜皮</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        
        if (code) {
            const btn = document.getElementById('btn');
            // 最纯净的跳转链接
            const deepLink = "trifles://auth?code=" + code;
            btn.href = deepLink;
            
            const isAndroid = /android/i.test(navigator.userAgent);
            if (!isAndroid) {
                // 🍎 iOS 的 Safari 依然允许自动跳转，保留极速体验
                setTimeout(() => { window.location.href = deepLink; }, 300);
            }
            // 🤖 安卓系统下，JS 到此为止！将页面停留在绿色的成功提示上。
            // 用户看到后，亲手点击蓝色的“返回 鸡毛蒜皮”按钮，安卓系统必将放行。
        } else {
            document.getElementById('content').innerHTML = "<h2 style='color:#ef4444'>❌ 授权失败</h2><p>未获取到核心授权码，请重试</p>";
        }
    </script>
</body>
</html>
