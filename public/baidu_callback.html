<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授权回调</title>
</head>
<body style="text-align: center; padding-top: 60px; font-family: -apple-system, sans-serif; background: #f9fafb;">
    
    <h2 id="msg" style="color: #666; font-size: 18px;">正在处理...</h2>
    
    <a id="btn" href="#" style="display: none; margin-top: 30px; padding: 14px 30px; background-color: #6366f1; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 16px;">
        立即返回鸡毛蒜皮
    </a>

    <script>
        // 用最原始的正则匹配，兼容所有老旧浏览器
        var match = window.location.search.match(/code=([^&]+)/);
        
        if (match && match[1]) {
            var code = match[1];
            var targetUrl = "trifles://auth?code=" + code;
            
            document.getElementById('msg').innerHTML = "<span style='color:#10b981'>授权成功！</span><br><span style='font-size:14px;color:#999;display:inline-block;margin-top:10px;'>请点击下方按钮唤醒 App</span>";
            
            var btn = document.getElementById('btn');
            btn.href = targetUrl;
            btn.style.display = "inline-block";
            
            // 延迟尝试自动唤醒
            setTimeout(function() {
                window.location.href = targetUrl;
            }, 500);
        } else {
            document.getElementById('msg').innerText = "未找到授权码，请重试。";
        }
    </script>
</body>
</html>
