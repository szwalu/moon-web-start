<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>鸡毛蒜皮隐私政策 / Trifles Daily Privacy Policy</title>
  <style>
    /* CSS 变量：定义浅色和深色主题的颜色 */
    :root {
      --bg-color: #ffffff;
      --text-color: #333333;
      --header-border: rgba(0, 0, 0, 0.06);
      --title-color: #1a1a1a;
      --meta-color: #888888;
      --intro-bg: #f0f7ff;
      --intro-text: #2c5282;
      --intro-border: #4299e1;
      --h3-color: #000000;
      --li-color: #444444;
      --strong-color: #000000;
      --copyright-color: #bbbbbb;
    }

    /* 原生深色模式适配 */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #101014;
        --text-color: #e0e0e0;
        --header-border: rgba(255, 255, 255, 0.08);
        --title-color: #ffffff;
        --intro-bg: rgba(66, 153, 225, 0.15);
        --intro-text: #90cdf4;
        --h3-color: #ffffff;
        --li-color: #cccccc;
        --strong-color: #ffffff;
      }
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    .modal-header {
      padding: 14px 20px;
      padding-top: calc(env(safe-area-inset-top) + 20px); 
      border-bottom: 1px solid var(--header-border);
      text-align: center;
      position: sticky;
      top: 0;
      background-color: var(--bg-color);
      z-index: 10;
    }

    .title {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: var(--title-color);
    }

    .content-padding {
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
      padding-bottom: max(40px, env(safe-area-inset-bottom));
    }

    .meta-info {
      text-align: center;
      font-size: 12px;
      color: var(--meta-color);
      margin-bottom: 20px;
    }
    
    .meta-info p { 
      margin: 2px 0; 
    }

    .intro-box {
      background-color: var(--intro-bg);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 24px;
      color: var(--intro-text);
      font-size: 14px;
      border-left: 4px solid var(--intro-border);
    }

    h3 {
      font-size: 16px;
      margin: 20px 0 10px;
      font-weight: 700;
      color: var(--h3-color);
    }

    ul {
      padding-left: 16px;
      margin: 0;
    }

    li {
      margin-bottom: 8px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--li-color);
      text-align: justify;
    }

    strong { 
      color: var(--strong-color); 
    }

    .end-copyright {
      margin-top: 40px;
      text-align: center;
      font-size: 12px;
      color: var(--copyright-color);
    }
  </style>
</head>
<body>

  <div id="app"></div>

  <script>
    const content = {
      zh: {
        title: '鸡毛蒜皮隐私政策',
        updateDate: '更新日期：2026 年 4 月 19 日',
        effectiveDate: '生效日期：2026 年 4 月 19 日',
        intro: '“鸡毛蒜皮”（以下简称“我们”）深知个人信息对您的重要性。作为一款纯本地应用，我们不会强迫您注册账号或将您的私人数据上传至云端，并严格遵循“最小必要”原则。',
        sections: [
          {
            title: '一、 我们请求的设备权限及用途',
            items: [
              '为了向您提供完整体验，我们仅在特定功能触发时向您申请以下权限：',
              '**相机与相册权限：** 当您在日记或账本中需要添加图片、拍照记录时，我们需要您授权相机和相册权限。',
              '**面部及指纹解锁（生物识别）：** 当您开启“应用锁”功能时，我们会调用设备系统的面部或指纹识别模块。**您的生物特征数据仅由系统本地处理验证，应用自身不会收集、存储或上传任何生物识别数据。**',
              '**位置权限与第三方 SDK（高德地图）：** 为了向您提供“默认城市定位”、“自动获取天气”及“位置搜索”功能，我们需要接入高德开放平台定位 SDK（由高德软件有限公司提供）。该 SDK 可能会收集您的设备信息、位置信息及网络状态。您可以访问 <span style="word-break: break-all; color: #6366f1;">https://lbs.amap.com/pages/privacy/</span> 了解其隐私政策。'
            ]
          },
          {
            title: '二、 第三方 AI 服务与数据共享说明',
            items: [
              '本应用采用离线优先架构，默认不收集您的任何数据。当且仅当您主动在应用设置中填入并开启了“第三方 AI 引擎”时，即表示您同意我们收集并共享特定数据以提供智能解析服务：',
              '**1. 收集与共享哪些数据及方式：** 我们仅会收集您在输入框内主动输入的**单条记账自然语言文本**，并将其作为网络请求发送。',
              '**2. 数据的用途：** 该文本仅用于进行**语义解析**，以自动为您提取账单的金额和分类，不作任何其他用途。',
              '**3. 接收方是谁：** 数据将直接发送至**您所配置的第三方大模型服务商（如 DeepSeek、智谱、硅基流动、Groq、OpenAI 等）**。此过程不经过我们任何中转服务器。',
              '**4. 同等保护确认：** 我们在此确认，我们所支持配置的上述主流第三方 AI 服务商，均具备合法合规的数据隐私保护机制，并为您提供与本应用**相同或同等水平的隐私保护**。我们建议您同时查阅您所选服务商的隐私政策。',
              '**5. 郑重承诺：** 我们绝不会上传您的任何历史账单、日记正文、照片及生物识别信息。若您清空 API Key，所有数据将绝对留存在本地。'
            ]
          },
          {
            title: '三、 数据存储',
            items: [
              '**完全本地化：** 您的所有文本、账单、图片等业务数据均**仅以加密形式保存在您的设备本地**。我们没有任何云端服务器用于存储您的这些数据，我们的人员也绝对无法查看您的记录。'
            ]
          },
          {
            title: '四、 您的权利',
            items: [
              '**撤回授权：** 您可以随时通过手机系统设置关闭摄像头、相册或位置权限，但这可能导致相应功能无法使用。',
              '**数据删除：** 由于数据纯本地存储，您可以随时在应用内删除单条记录，或通过卸载应用的方式彻底擦除所有数据。'
            ]
          },
          {
            title: '五、 联系我们',
            items: [
              '如果您对隐私保护有任何疑问或意见，请联系我们：',
              '邮箱：**ming@woabc.com**'
            ]
          }
        ]
      },
      en: {
        title: 'Trifles Daily Privacy Policy',
        updateDate: 'Updated: Apr 19, 2026',
        effectiveDate: 'Effective: Apr 19, 2026',
        intro: 'At Trifles Daily ("We"), we respect your privacy. As a strictly local-first application, we do not require account registration or upload your private data to the cloud.',
        sections: [
          {
            title: '1. Device Permissions We Request',
            items: [
              'We only request permissions strictly necessary for core features:',
              '**Camera & Photos:** Required only when you actively choose to take a photo or attach images to your notes/accounting records.',
              '**Face/Fingerprint Unlock (Biometrics):** When you enable the App Lock, we utilize your device\'s native biometric verification. **Your biometric data is processed entirely locally by your device OS. We do not collect, store, or transmit it.**',
              '**Location & Third-Party SDK (AMap/Gaode):** To provide "Default City", "Auto Weather", and location search features, we integrate the AMap Location SDK. This SDK may collect device info and location. Please refer to their privacy policy at <span style="word-break: break-all; color: #6366f1;">https://lbs.amap.com/pages/privacy/</span>.'
            ]
          },
          {
            title: '2. Third-Party AI Services & Data Sharing',
            items: [
              'This app operates with a local-first architecture and does not collect your data by default. Only when you actively configure and enable a "Third-Party AI Engine" in the settings do you consent to the collection and sharing of specific data for intelligent parsing:',
              '**- What data is collected & How:** We only collect the **single natural language text entry** you actively type into the chat input box and transmit it as an API request.',
              '**- Uses of data:** This text is used exclusively for **semantic parsing** to automatically extract the amount and category of your record. It is not used for any other purpose.',
              '**- Who it is sent to:** Your text will be sent directly to the **third-party AI service provider you configured (e.g., DeepSeek, Zhipu, SiliconFlow, Groq, OpenAI, etc.)**. This process does not pass through any intermediate servers owned by us.',
              '**- Equal Protection Confirmation:** We confirm that the mainstream third-party AI service providers supported for configuration provide privacy protection mechanisms that offer the **same or equal protection** of user data as stated in this privacy policy. We recommend that you also review the privacy policy of your chosen provider.',
              '**- Our Commitment:** We will NEVER upload your historical accounting data, journal entries, photos, or biometric data. If you clear the API Key, all data remains strictly local.'
            ]
          },
          {
            title: '3. Data Storage',
            items: [
              '**100% Local:** All your notes, accounts, and media are **stored exclusively on your local device**. We do not have servers hosting your data, and we cannot access your content.'
            ]
          },
          {
            title: '4. Your Rights',
            items: [
              '**Revoke Permissions:** You can disable Camera, Photos, or Location access at any time via your device settings.',
              '**Data Deletion:** Since all data is local, you can delete individual records within the app, or completely erase everything by uninstalling the application.'
            ]
          },
          {
            title: '5. Contact Us',
            items: [
              'For any privacy-related questions, please contact:',
              'Email: **ming@woabc.com**'
            ]
          }
        ]
      }
    };

    // 1. 获取浏览器语言环境
    const navLang = navigator.language || navigator.userLanguage;
    const currentLang = navLang.startsWith('zh') ? 'zh' : 'en';
    const activeContent = content[currentLang];

    // 2. 更新页面 Title 和 Lang 属性
    document.title = activeContent.title;
    document.documentElement.lang = currentLang;

    // 3. 解析加粗语法的工具函数
    const parseBold = (text) => {
      return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    };

    // 4. 动态生成并注入 HTML
    const renderApp = () => {
      let sectionsHtml = activeContent.sections.map(section => `
        <section class="section-block">
          <h3>${section.title}</h3>
          <ul>
            ${section.items.map(item => `<li>${parseBold(item)}</li>`).join('')}
          </ul>
        </section>
      `).join('');

      const appHtml = `
        <header class="modal-header">
          <h2 class="title">${activeContent.title}</h2>
        </header>

        <div class="content-padding">
          <div class="meta-info">
            <p>${activeContent.updateDate}</p>
            <p>${activeContent.effectiveDate}</p>
          </div>

          <div class="intro-box">
            <p>${activeContent.intro}</p>
          </div>

          ${sectionsHtml}

          <div class="end-copyright">
            © 2026 Trifles Daily. All rights reserved.
          </div>
        </div>
      `;

      document.getElementById('app').innerHTML = appHtml;
    };

    // 执行渲染
    renderApp();
  </script>
</body>
</html>
